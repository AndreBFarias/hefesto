# Manifest Flatpak — Hefesto
# App ID: br.andrefarias.Hefesto
# Runtime: org.gnome.Platform//47 (GTK3, PyGObject, python3 3.12, gi-repository)
# Construção local: scripts/build_flatpak.sh
# CI: .github/workflows/flatpak.yml
#
# Histórico de runtime:
#   - v2.3.x: GNOME Platform//45 — deps Python quase todas ausentes (bug).
#   - v2.4.0 (2026-04-24): GNOME Platform//47 + deps Python completas como
#     módulo `hefesto-deps`. Fix para BUG-FLATPAK-DEPS-01 (gi/pydantic
#     ausentes ao abrir hefesto-gui em instalação recém-feita).

app-id: br.andrefarias.Hefesto
runtime: org.gnome.Platform
runtime-version: "47"
sdk: org.gnome.Sdk

# Ponto de entrada principal — GUI GTK3
command: hefesto-gui

# Permissões de sandbox
finish-args:
  # Compartilhamento IPC entre processos (necessário para GTK X11)
  - --share=ipc
  # Suporte a X11 com fallback se Wayland não disponível
  - --socket=fallback-x11
  # Suporte a Wayland nativo (COSMIC, GNOME)
  - --socket=wayland
  # Acesso ao D-Bus de sessão (portals, notificações)
  - --socket=session-bus
  # Acesso a todos os dispositivos: hidraw (DualSense) + uinput (emulação de mouse/gamepad)
  # Nota: --device=input não basta para /dev/hidraw*; usar --device=all
  - --device=all
  # Socket IPC do daemon Hefesto em $XDG_RUNTIME_DIR/hefesto/
  - --filesystem=xdg-run/hefesto:create
  # Perfis e configurações em ~/.config/hefesto/
  # Dentro do sandbox: ~/.var/app/br.andrefarias.Hefesto/config/hefesto/
  - --filesystem=xdg-config/hefesto:create
  # Portals do freedesktop (notificações, tray, background, window tracking)
  - --talk-name=org.freedesktop.portal.*

modules:
  # Módulo 1: todas as dependências Python do Hefesto num único pip install.
  #
  # Por que consolidado: o wheel `hefesto` é instalado com `--no-deps` no
  # módulo 2 (para evitar recursão de resolver do pip sobre deps já dentro
  # do runtime). Portanto as deps declaradas em `pyproject.toml` precisam
  # ser empurradas explicitamente aqui. Inclui `python-uinput` e
  # `pydualsense` que antes estavam em módulos separados.
  #
  # `--share=network` é necessário porque o Flathub build farm baixa os
  # wheels do PyPI. Alternativa offline seria cravar `type: file` + sha256
  # para cada wheel (~15 arquivos, 4 MiB), mas o overhead de atualização
  # das hashes a cada bump não compensa o benefício marginal de
  # reprodutibilidade.
  - name: hefesto-deps
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      - pip3 install --prefix=/app --no-build-isolation
          "pydualsense>=0.7.5"
          "python-uinput"
          "textual>=0.47"
          "typer>=0.9"
          "pydantic>=2.0"
          "python-xlib>=0.33"
          "evdev>=1.6"
          "structlog>=23.0"
          "rich>=13.0"
          "platformdirs>=4.0"
          "filelock>=3.13"
          "jeepney>=0.8"
    sources: []

  # Módulo 2: wlrctl — CLI wayland wlroots usado por WlrctlBackend
  # (BUG-COSMIC-WLR-BACKEND-01). No fluxo .deb vem via Recommends do apt;
  # no sandbox do Flatpak precisa ser bundlado para que
  # shutil.which("wlrctl") retorne /app/bin/wlrctl dentro da sandbox.
  #
  # Upstream: https://git.sr.ht/~brocellous/wlrctl (tag v0.2.2).
  # Deps (probadas empiricamente em org.gnome.Sdk//47): xkbcommon,
  # wayland-client, wayland-scanner. Os XMLs de wayland-protocols ficam
  # bundlados no próprio repositório do wlrctl, então não depende de
  # wayland-protocols do sistema.
  #
  # -Dwerror=false defensivo: wlrctl compila com -Werror por padrão;
  # uma versão de compilador mais nova no SDK pode introduzir warnings
  # e quebrar o build. Desligar o werror blinda o bundling.
  - name: wlrctl
    buildsystem: meson
    config-opts:
      - --buildtype=release
      - -Dwerror=false
    sources:
      - type: archive
        url: https://git.sr.ht/~brocellous/wlrctl/archive/v0.2.2.tar.gz
        sha256: b5b3836091c41de09a832df1e5eb4747841d7ae670367e413487d5be7a5f2849
    cleanup:
      - /share/man

  # Módulo 3: Hefesto — instalação do wheel local com --no-deps
  - name: hefesto
    buildsystem: simple
    build-commands:
      # Instalar o wheel pré-construído (gerado por 'python -m build' no script).
      # --no-deps porque o módulo `hefesto-deps` acima já empurrou tudo.
      - pip3 install --prefix=/app --no-deps ./dist/*.whl

      # Instalar ícone 256x256 para o lançador do sistema
      - install -Dm644 assets/appimage/Hefesto.png
          /app/share/icons/hicolor/256x256/apps/br.andrefarias.Hefesto.png

      # Instalar arquivo .desktop adaptado para o App ID Flatpak
      - install -Dm644 flatpak/br.andrefarias.Hefesto.desktop
          /app/share/applications/br.andrefarias.Hefesto.desktop

      # Instalar metadata AppStream
      - install -Dm644 flatpak/br.andrefarias.Hefesto.metainfo.xml
          /app/share/metainfo/br.andrefarias.Hefesto.metainfo.xml

      # Copiar regras udev para dentro do bundle (leitura apenas)
      # Instalação no host via scripts/install-host-udev.sh + pkexec
      - install -Dm644 assets/70-ps5-controller.rules
          /app/share/hefesto/udev-rules/70-ps5-controller.rules
      - install -Dm644 assets/71-uinput.rules
          /app/share/hefesto/udev-rules/71-uinput.rules
      - install -Dm644 assets/72-ps5-controller-autosuspend.rules
          /app/share/hefesto/udev-rules/72-ps5-controller-autosuspend.rules

      # Instalar script de setup de udev (executado pelo usuário uma vez)
      - install -Dm755 scripts/install-host-udev.sh
          /app/bin/install-host-udev.sh

    sources:
      # Código-fonte local (usado pelo flatpak-builder com --force-clean)
      - type: dir
        path: ..
