name: Flatpak Build

on:
  push:
    branches: [main]
    paths:
      - "flatpak/**"
      - "scripts/build_flatpak.sh"
      - "scripts/install-host-udev.sh"
      - "pyproject.toml"
      - "src/**"
  pull_request:
    paths:
      - "flatpak/**"
      - "scripts/build_flatpak.sh"

permissions:
  contents: read

jobs:
  validate-manifest:
    name: Validar manifest e metainfo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verificar sintaxe YAML do manifest
        run: |
          python3 -c "
          import yaml, sys
          with open('flatpak/br.andrefarias.Hefesto.yml') as f:
              doc = yaml.safe_load(f)
          assert doc['app-id'] == 'br.andrefarias.Hefesto'
          assert doc['command'] == 'hefesto-gui'
          print('Manifest YAML valido.')
          print(f'  app-id: {doc[\"app-id\"]}')
          print(f'  runtime: {doc[\"runtime\"]}//{doc[\"runtime-version\"]}')
          "

      - name: Instalar appstreamcli
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q appstream

      - name: Validar metainfo AppStream
        run: |
          appstreamcli validate --no-net \
            flatpak/br.andrefarias.Hefesto.metainfo.xml

  build-flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    needs: validate-manifest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            flatpak \
            flatpak-builder \
            python3-pip \
            python3-build \
            libhidapi-dev \
            libudev-dev

      - name: Adicionar remote Flathub
        run: |
          flatpak remote-add --user --if-not-exists \
            flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Instalar runtime GNOME//45
        run: |
          flatpak install --user -y flathub \
            org.gnome.Platform//45 \
            org.gnome.Sdk//45

      - name: Construir wheel Python
        run: |
          pip3 install build
          python3 -m build --wheel --outdir dist/
          ls -lh dist/*.whl

      - name: Construir Flatpak
        run: |
          flatpak-builder \
            --user \
            --force-clean \
            --repo=flatpak-repo \
            flatpak-build-dir \
            flatpak/br.andrefarias.Hefesto.yml

      - name: Exportar bundle .flatpak
        run: |
          flatpak build-bundle \
            flatpak-repo \
            br.andrefarias.Hefesto.flatpak \
            br.andrefarias.Hefesto

      - name: Install --user do bundle (smoke de instalação)
        run: |
          flatpak install --user --noninteractive --bundle \
            br.andrefarias.Hefesto.flatpak
          flatpak list --user --app | grep -i hefesto

      - name: Validar registro do app
        run: |
          flatpak info --user br.andrefarias.Hefesto
          # Execução real de GUI requer DISPLAY; em runner headless a execução
          # via `flatpak run` pode falhar por falta de sessão X11/Wayland.
          # Aqui o critério é o pacote estar corretamente instalado e
          # registrado. `flatpak info` confirma metadata + runtime base.

      - name: Upload do bundle .flatpak
        uses: actions/upload-artifact@v4
        with:
          name: hefesto-flatpak
          path: br.andrefarias.Hefesto.flatpak
          retention-days: 30
          if-no-files-found: error

      - name: Upload do log de build (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-build-log
          path: |
            flatpak-build-dir/**/build.log
            flatpak-build-dir/**/*.log
          retention-days: 7
          if-no-files-found: warn
