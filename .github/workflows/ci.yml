name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  anonymity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check_anonymity.sh

  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/check_version_consistency.py

  lint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Instalar deps do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libhidapi-dev libhidapi-hidraw0 libudev-dev libxi-dev
      - name: Instalar Hefesto em modo dev
        run: pip install -e ".[dev]"
      - name: Verificar tamanho de HID captures
        run: |
          OVERSIZE=$(find tests/fixtures -name "*.bin" -size +5M 2>/dev/null)
          if [[ -n "$OVERSIZE" ]]; then
            echo "ERRO: captures excedem 5MB:"
            echo "$OVERSIZE"
            exit 1
          fi
      - name: Ruff
        run: ruff check src/ tests/
      - name: Mypy
        run: mypy src/hefesto
      - name: Pytest unit
        run: pytest tests/unit -v --cov=hefesto

  runtime-smoke:
    runs-on: ubuntu-latest
    needs: lint-test
    strategy:
      fail-fast: false
      matrix:
        transport: [usb, bt]
    env:
      TRANSPORT: ${{ matrix.transport }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar deps do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libhidapi-dev libhidapi-hidraw0 libudev-dev libxi-dev
      - name: Instalar Hefesto em modo dev
        run: pip install -e ".[dev]"
      - name: Preparar venv esperado pelo run.sh
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"
      - name: Smoke runtime-real
        env:
          HEFESTO_FAKE: "1"
          HEFESTO_FAKE_TRANSPORT: ${{ matrix.transport }}
          HEFESTO_SMOKE_DURATION: "2.0"
        run: |
          if [[ "$TRANSPORT" == "bt" ]]; then
            ./run.sh --smoke --bt
          else
            ./run.sh --smoke
          fi
      - name: Verificar ausencia de AssertionError e Traceback no log
        run: |
          LOG="/tmp/hefesto_smoke_${TRANSPORT}.log"
          if [[ ! -f "$LOG" ]]; then
            echo "erro: log $LOG nao foi gerado pelo smoke"
            exit 1
          fi
          if grep -qE "AssertionError|Traceback" "$LOG"; then
            echo "erro: smoke produziu AssertionError ou Traceback"
            grep -nE "AssertionError|Traceback" "$LOG"
            exit 1
          fi
          echo "smoke limpo: sem AssertionError ou Traceback em $LOG"
      - name: Upload smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hefesto-smoke-${{ matrix.transport }}.log
          path: /tmp/hefesto_smoke_${{ matrix.transport }}.log
          if-no-files-found: ignore
