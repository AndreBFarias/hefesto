name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag para re-publicar (ex.: v2.1.0). Permite correr release.yml manualmente contra uma tag existente — útil após fixes de CI (CHORE-CI-REPUBLISH-TAGS-01)."
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.info.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Quando disparado via workflow_dispatch, faz checkout da tag
          # indicada no input em vez de main HEAD.
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libhidapi-dev libhidapi-hidraw0 libudev-dev libxi-dev
      - name: Verificar anonimato
        run: bash scripts/check_anonymity.sh
      - name: Instalar e testar
        run: |
          pip install -e ".[dev]"
          ruff check src/ tests/
          pytest tests/unit -v
      - name: Build wheel + sdist
        run: |
          pip install build twine
          python -m build
          twine check dist/*
      - name: Ler versão
        id: info
        env:
          # Em workflow_dispatch, github.ref_name é o branch/ref do run (ex.: main);
          # o input `tag` tem o valor real (ex.: v2.1.0). Prioriza o input.
          REF_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ steps.info.outputs.version }}
          path: dist/

  appimage:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Deps do SO (libfuse2 pra AppImage + librsvg pra PNG)
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 librsvg2-bin \
            libhidapi-dev libhidapi-hidraw0 libudev-dev libxi-dev
      - uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.build.outputs.version }}
          path: dist/
      - name: Instalar python-appimage
        run: |
          pip install -e ".[dev]"
          pip install python-appimage build
      - name: Gerar AppImage
        run: bash scripts/build_appimage.sh
      - name: Smoke AppImage
        run: ./dist/appimage/Hefesto-*-x86_64.AppImage version
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: appimage-${{ needs.build.outputs.version }}
          path: dist/appimage/*.AppImage

  deb:
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalar dpkg-deb (nativo no Ubuntu)
        run: sudo apt-get update && sudo apt-get install -y dpkg
      - name: Build .deb
        run: bash scripts/build_deb.sh
      - name: Upload pacote .deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ needs.build.outputs.version }}
          path: dist/*.deb

  deb-install-smoke:
    name: Smoke install do .deb
    # BUG-DEB-SMOKE-PYDANTIC-V2-NOBLE-01: validacao empirica 2026-04-24
    # confirmou que Noble (24.04) tambem entrega python3-pydantic 1.10.x,
    # nao v2 como a sprint 74 assumiu. Ubuntu plucky (25.04) tem v2 no apt
    # mas nao esta disponivel como runner padrao. Solucao: continuar em
    # 22.04 (mesma release do build) e injetar pydantic>=2 via pip ANTES
    # do apt install. control nao declara mais (>= 2.0) para que apt
    # resolva o dep com o python3-pydantic 1.x do sistema; runtime do
    # Hefesto detecta v1 e avisa (ver src/hefesto/__init__.py).
    runs-on: ubuntu-22.04
    needs: [build, deb]
    env:
      VERSION: ${{ needs.build.outputs.version }}
    steps:
      - name: Baixar artifact do .deb
        uses: actions/download-artifact@v4
        with:
          name: deb-${{ needs.build.outputs.version }}
          path: ./dist
      - name: Listar artifact
        run: ls -lah ./dist
      - name: Instalar pydantic v2 + structlog moderno via pip (L-21-7 expandida)
        # Jammy apt: python3-pydantic 1.10, python3-structlog 20.1 — ambos
        # antigos demais para Hefesto. BUG-DEB-SMOKE-STRUCTLOG-TYPING-02
        # (sprint 82) expandiu a injeção pip do pydantic para cobrir
        # structlog também; PYTHONPATH user-site traz as versões modernas.
        run: |
          python3 -m pip install --user --upgrade 'pydantic>=2.0' 'structlog>=22.1'
      - name: Instalar .deb via apt (resolve deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y ./dist/hefesto_*_amd64.deb
      - name: Validar binário hefesto
        run: |
          which hefesto
          # Expor pydantic v2 do pip --user para o hefesto (instalado em
          # /usr/lib/python3/dist-packages). PYTHONPATH coloca o user site
          # ANTES do dist-packages para o import encontrar a v2 primeiro.
          USER_SITE="$(python3 -m site --user-site)"
          echo "USER_SITE=$USER_SITE"
          PYTHONPATH="$USER_SITE" hefesto --version
      - name: Validar binário hefesto-gui
        run: |
          which hefesto-gui
          # --help em runner headless pode falhar por falta de DISPLAY/GTK;
          # o critério é localizar o binário. Exit não-zero aqui é aceitável.
          USER_SITE="$(python3 -m site --user-site)"
          PYTHONPATH="$USER_SITE" hefesto-gui --help || echo "hefesto-gui --help retornou não-zero em headless (esperado)"
      - name: Desinstalar (valida postrm)
        run: sudo apt-get remove -y hefesto

  flatpak:
    name: Build Flatpak bundle
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            flatpak \
            flatpak-builder \
            python3-pip \
            python3-build \
            libhidapi-dev \
            libudev-dev
      - name: Adicionar remote Flathub
        run: |
          flatpak remote-add --user --if-not-exists \
            flathub https://dl.flathub.org/repo/flathub.flatpakrepo
      - name: Instalar runtime GNOME//45
        run: |
          flatpak install --user -y flathub \
            org.gnome.Platform//45 \
            org.gnome.Sdk//45
      - name: Construir wheel Python
        run: |
          pip3 install build
          python3 -m build --wheel --outdir dist/
      - name: Construir Flatpak
        run: |
          flatpak-builder \
            --user \
            --force-clean \
            --repo=flatpak-repo \
            flatpak-build-dir \
            flatpak/br.andrefarias.Hefesto.yml
      - name: Exportar bundle .flatpak
        run: |
          flatpak build-bundle \
            flatpak-repo \
            br.andrefarias.Hefesto.flatpak \
            br.andrefarias.Hefesto
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-${{ needs.build.outputs.version }}
          path: br.andrefarias.Hefesto.flatpak
          if-no-files-found: error

  github-release:
    needs: [build, appimage, deb, deb-install-smoke, flatpak]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.build.outputs.version }}
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: appimage-${{ needs.build.outputs.version }}
          path: dist/appimage/
      - uses: actions/download-artifact@v4
        with:
          name: deb-${{ needs.build.outputs.version }}
          path: dist/deb/
      - uses: actions/download-artifact@v4
        with:
          name: flatpak-${{ needs.build.outputs.version }}
          path: dist/flatpak/
      - name: Criar release no GitHub
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --title "Hefesto v${VERSION}" \
            --notes-file CHANGELOG.md \
            dist/hefesto-*.whl dist/hefesto-*.tar.gz \
            dist/appimage/*.AppImage \
            dist/deb/*.deb \
            dist/flatpak/*.flatpak

  pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    if: ${{ vars.PYPI_PUBLISH == 'true' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.build.outputs.version }}
          path: dist/
      - name: Publicar no PyPI (OIDC trusted publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
